<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #f3ba2f;
            font-size: 32px;
        }

        .header p {
            color: #ccc;
            margin-top: 10px;
        }

        .content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .content h2 {
            color: #111;
            margin-bottom: 20px;
        }

        .content p {
            color: #666;
            font-size: 16px;
            line-height: 1.8;
        }

        .btn {
            display: inline-block;
            background: #f3ba2f;
            color: #000;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }

        .btn:hover {
            background: #e0a91f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✅ Login Successful!</h1>
            <p>Welcome to Binance Dashboard</p>
        </div>

        <div class="content">
            <h2>You're now logged in!</h2>
            <p>Your trading account is ready.</p>
            <a href="index.html" class="btn">← Logout</a>
        </div>
    </div>
</body>
</html>
